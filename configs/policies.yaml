## Policy-mode configuration for the vignette generator.
##
## Each policy defines the exact stance the post will express and the
## opposing stance that hate-speech comments will attack at all 3 severity
## levels. Researcher only needs to edit this file — no Python changes needed.
##
## Required fields:
##   id              — unique snake_case identifier (used in output CSV + filenames)
##   topic           — must match a value in study_config.yaml design.topics
##   post_stance     — exact claim the post must express (5–15 words)
##   opposing_stance — the position hate-speech comments will argue for (5–15 words)
##   values          — progressive | conservative (drives profile persona generation)
##
## Optional fields:
##   target_group    — overrides the automatic TARGET_GROUPS lookup in posts.py
##   enabled         — set to false to skip without deleting the entry (default: true)

policies:

  # -----------------------------------------------
  # ---- Feminism-related policies --------------
  # -----------------------------------------------

  - id: corporate_gender_quotas_support
    topic: feminism
    post_stance: "support mandatory gender quotas in corporate boardrooms, political parties, or public offices"
    opposing_stance: "oppose mandatory gender quotas in corporate boardrooms, political parties, or public offices"
    target_group: "women"
    values: progressive
    enabled: true

  - id: corporate_gender_quotas_oppose
    topic: feminism
    post_stance: "oppose mandatory gender quotas in corporate boardrooms, political parties, or public offices"
    opposing_stance: "support mandatory gender quotas in corporate boardrooms, political parties, or public offices"
    target_group: "women"
    values: conservative
    enabled: true

  # -----------------------------------------------
  # Climate-related policies 
  # -----------------------------------------------

  - id: climate_action_support
    topic: climate
    post_stance: "support policies mitgating climate change"
    opposing_stance: "oppose policies mitgating climate change, arguing these policies stifle the economy and increase inequality"
    target_group: "environmentalists"
    values: progressive
    enabled: true

  - id: climate_action_oppose
    topic: climate
    post_stance: "oppose policies mitgating climate change, arguing these policies stifle the economy and increase inequality"
    opposing_stance: "support policies mitgating climate change"
    target_group: "environmentalists"
    values: conservative
    enabled: true

