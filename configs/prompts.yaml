## All LLM prompts used in the pipeline.
## Stored externally so prompt versions can be tracked independently of code.
## Variables use {curly_brace} Python str.format() syntax.

profile_generation:
  system: >
    You are a social-science researcher designing realistic synthetic Instagram
    profiles for an academic study on online hate speech. All profiles are
    entirely fictional. Return ONLY valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic fictional Instagram profile for an academic study.

    Constraints:
    - topic: {topic}
    - age_group: {age_group} (age range: {age_min}–{age_max})
    - gender: {gender}
    - stance: {stance} (the profile owner {stance}s this topic)
    - religion: {religion}
    - country_of_origin: {country_of_origin}
    - The profile owner posts about the topic above and {stance}s it.
    - The poster is originally from {country_of_origin} and identifies as {religion}.
    - The profile must feel like a real person, not a caricature.
    - username: lowercase, dots or underscores only, no spaces.
    - bio: max 150 characters, realistic Instagram bio.
    - interests: exactly 3 items relevant to the topic and stance.
    - writing_style: one of: casual, formal, emoji-heavy, hashtag-heavy, reflective, confrontational, humorous, earnest.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "profile_id": "{profile_id}",
      "username": "<string>",
      "display_name": "<string>",
      "age": <integer between {age_min} and {age_max}>,
      "age_group": "{age_group}",
      "gender": "{gender}",
      "stance": "{stance}",
      "religion": "{religion}",
      "country_of_origin": "{country_of_origin}",
      "interests": ["<string>", "<string>", "<string>"],
      "writing_style": "<string>",
      "bio": "<string up to 150 chars>"
    }}

profile_generation_free:
  system: >
    You are a social-science researcher designing realistic synthetic Instagram
    profiles for an academic study on online hate speech. All profiles are
    entirely fictional. Return ONLY valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic fictional Instagram profile for an academic study.
    This profile will be used across multiple topics and stances — do NOT
    tie the persona to a single topic or ideological position.

    Constraints:
    - gender: {gender}
    - popularity_level: {popularity_level}
      (ordinary user = few hundred followers, active user = a few thousand,
       micro-influencer = tens of thousands)
    - country_of_origin: {country_of_origin}
    - Choose an appropriate age group freely: adolescent (13–17) or young_adult (18–25).
    - Choose a religion freely: Muslim, Christian, or Jewish.
    - The profile must feel like a real person, not a caricature.
    - username: lowercase, dots or underscores only, no spaces.
    - bio: max 150 characters, realistic Instagram bio matching the popularity level.
    - interests: exactly 3 general lifestyle or hobby interests (not topic-specific).
    - writing_style: one of: casual, formal, emoji-heavy, hashtag-heavy, reflective, confrontational, humorous, earnest.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "profile_id": "{profile_id}",
      "username": "<string>",
      "display_name": "<string>",
      "age": <integer>,
      "age_group": "<adolescent | young_adult>",
      "gender": "{gender}",
      "religion": "<Muslim | Christian | Jewish>",
      "country_of_origin": "{country_of_origin}",
      "interests": ["<string>", "<string>", "<string>"],
      "writing_style": "<string>",
      "bio": "<string up to 150 chars>"
    }}

post_generation:
  system: >
    You are a social-science researcher creating realistic synthetic Instagram
    captions for an academic study on online hate speech. All content is
    fictional and for research purposes. Return ONLY valid JSON — no markdown,
    no explanations.
  user: |
    Generate a realistic Instagram post caption for this fictional profile.

    Profile context:
    - username: {username}
    - age_group: {age_group}
    - gender: {gender}
    - stance: {stance_label}
    - writing_style: {writing_style}
    - topic: {topic}

    STRICT RULES:
    1. The caption MUST express the position: {stance_label}.
    2. It MAY be polarizing or politically charged.
    3. It MUST NEVER contain hate speech, slurs, or calls to violence.
    4. It must be 15–40 words (caption text only, excluding hashtags).
    5. Include 2–4 relevant hashtags.
    6. Match the writing_style: {writing_style}.
    7. Sound like a real Instagram post from a {age_group} ({gender}).
    8. Do NOT start with "I think" or "In my opinion".

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "post_id": "{post_id}",
      "profile_id": "{profile_id}",
      "topic": "{topic}",
      "caption": "<caption text, 15–40 words>",
      "hashtags": ["<tag1>", "<tag2>", "<tag3>"],
      "word_count": <integer>
    }}

comment_opposing_opinion:
  system: >
    You are a social-science researcher generating synthetic social media
    comments for an academic study on hate speech escalation. Return ONLY
    valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic social media comment that expresses OPPOSING OPINION
    (severity level 1 of 3) in response to this Instagram post.

    Original post (topic: {topic}):
    "{caption}"

    {target_group_context}

    SEVERITY LEVEL 1 — OPPOSING OPINION:
    - Express strong disagreement or a contrasting viewpoint.
    - May be blunt, dismissive, or condescending.
    - Targets the IDEA, not the person's group identity.
    - No slurs, no dehumanisation, no threats.
    - Realistic social media tone (may be sarcastic or frustrated).
    - 10–35 words.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "comment_id": "{comment_id}",
      "post_id": "{post_id}",
      "severity": "opposing_opinion",
      "text": "<comment text>",
      "toxicity_estimate": <float 0.0–1.0; expected range 0.1–0.35>,
      "target_group": "<social group targeted by this comment>",
      "contains_explicit_violence": false
    }}

comment_dehumanising:
  system: >
    You are a social-science researcher generating synthetic social media
    comments for an academic study on hate speech escalation. Return ONLY
    valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic social media comment that is DEHUMANISING
    (severity level 2 of 3) in response to this Instagram post.

    Original post (topic: {topic}):
    "{caption}"

    {target_group_context}

    SEVERITY LEVEL 2 — DEHUMANISING:
    - Attacks the poster's GROUP IDENTITY, not just the idea.
    - Uses othering language ("those people", "they always"), stereotypes,
      disgust framing, or comparisons that strip dignity.
    - May include coded language or dog whistles.
    - Does NOT include explicit calls to violence or direct threats.
    - 10–35 words.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "comment_id": "{comment_id}",
      "post_id": "{post_id}",
      "severity": "dehumanising",
      "text": "<comment text>",
      "toxicity_estimate": <float 0.0–1.0; expected range 0.50–0.80>,
      "target_group": "<social group targeted by this comment>",
      "contains_explicit_violence": false
    }}

comment_inciting_violence:
  system: >
    You are a social-science researcher generating synthetic social media
    comments for an academic study on hate speech escalation. Return ONLY
    valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic social media comment that INCITES VIOLENCE
    (severity level 3 of 3) in response to this Instagram post.

    Original post (topic: {topic}):
    "{caption}"

    {target_group_context}

    SEVERITY LEVEL 3 — INCITING STRONG HOSTILITY:
    - Moves beyond dehumanisation to explicit threat, call-to-action,
      or endorsement of strong hostility against the poster's group.
    - May include: "should be removed", "deserve what's coming", "should be punished",
      "someone should punch them", direct threats, or celebration
      of strong hostility against the group.
    - 10–35 words.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "comment_id": "{comment_id}",
      "post_id": "{post_id}",
      "severity": "inciting_violence",
      "text": "<comment text>",
      "toxicity_estimate": <float 0.0–1.0; expected range 0.75–1.0>,
      "target_group": "<social group targeted by this comment>",
      "contains_explicit_violence": true
    }}

