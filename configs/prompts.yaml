    Original post (topic: {topic}):
    "{caption}"

    The post argues for: "{post_stance}"
    The commenter argues for: "{opposing_stance}"
    Target group implied by the post: {target_group}

    SEVERITY LEVEL 1 — OPPOSING OPINION:
    - Express strong disagreement with the specific policy stance above.
    - May be blunt, dismissive, or condescending.
    - Targets the IDEA and the policy, not the person's group identity.
    - No slurs, no dehumanisation, no threats.
    - Realistic social media tone (may be sarcastic or frustrated).
    - 10–35 words.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "comment_id": "{comment_id}",
      "post_id": "{post_id}",
      "severity": "opposing_opinion",
      "text": "<comment text>",
      "toxicity_estimate": <float 0.0–1.0; expected range 0.1–0.35>,
      "target_group": "<social group targeted by this comment>",
      "contains_explicit_violence": false
    }}

comment_dehumanising_policy:
  system: >
    You are a social-science researcher generating synthetic social media
    comments for an academic study on hate speech escalation. Return ONLY
    valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic social media comment that is DEHUMANISING
    (severity level 2 of 3) in response to this Instagram post.

    Original post (topic: {topic}):
    "{caption}"

    The post argues for: "{post_stance}"
    The commenter argues for: "{opposing_stance}"
    Target group implied by the post: {target_group}

    SEVERITY LEVEL 2 — DEHUMANISING:
    - Attacks the GROUP IDENTITY of people who hold the post's stance, not just the idea.
    - Uses othering language ("those people", "they always"), stereotypes,
      disgust framing, or comparisons that strip dignity.
    - May include coded language or dog whistles.
    - Does NOT include explicit calls to violence or direct threats.
    - 10–35 words.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "comment_id": "{comment_id}",
      "post_id": "{post_id}",
      "severity": "dehumanising",
      "text": "<comment text>",
      "toxicity_estimate": <float 0.0–1.0; expected range 0.50–0.80>,
      "target_group": "<social group targeted by this comment>",
      "contains_explicit_violence": false
    }}

comment_inciting_violence_policy:
  system: >
    You are a social-science researcher generating synthetic social media
    comments for an academic study on hate speech escalation. Return ONLY
    valid JSON — no markdown, no explanations.
  user: |
    Generate a realistic social media comment that INCITES VIOLENCE
    (severity level 3 of 3) in response to this Instagram post.

    Original post (topic: {topic}):
    "{caption}"

    The post argues for: "{post_stance}"
    The commenter argues for: "{opposing_stance}"
    Target group implied by the post: {target_group}

    SEVERITY LEVEL 3 — INCITING VIOLENCE:
    - Moves beyond dehumanisation to explicit threat, call-to-action,
      or endorsement of violence against people who hold the post's stance.
    - May include: "should be removed", "deserve what's coming",
      "someone should deal with them", direct threats, or celebration
      of violence against the group.
    - 10–35 words.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "comment_id": "{comment_id}",
      "post_id": "{post_id}",
      "severity": "inciting_violence",
      "text": "<comment text>",
      "toxicity_estimate": <float 0.0–1.0; expected range 0.75–1.0>,
      "target_group": "<social group targeted by this comment>",
      "contains_explicit_violence": true
    }}

severity_judge:
  system: >
    You are a trained hate speech annotation expert. Classify social media
    comments on a 1–3 severity scale. Return ONLY valid JSON — no markdown,
    no explanations.
  user: |
    Classify this social media comment on a hate speech severity scale.

    Comment: "{text}"

    Context — it was posted in response to an Instagram post about: {topic}

    Severity scale:
    1 = opposing_opinion   — disagrees with the post's viewpoint; may be rude
                             or dismissive but does not attack group identity.
    2 = dehumanising       — attacks the poster's group identity; uses othering
                             language, stereotypes, or disgust framing.
    3 = inciting_violence  — explicit threat, call to violence, or endorsement
                             of harm against the group.

    Return ONLY this JSON object (no markdown, no explanation):
    {{
      "severity_score": <integer 1, 2, or 3>,
      "severity_label": "<opposing_opinion | dehumanising | inciting_violence>",
      "confidence": <float 0.0–1.0>,
      "reasoning": "<one sentence>"
    }}

realism_check:
  system: >
    You are a social media content analyst. Assess whether an Instagram post
    caption sounds realistic. Return ONLY valid JSON — no markdown.
  user: |
    Does this Instagram caption sound like something a real {age_group}
    ({gender}, {stance}s this topic) would post about {topic}?

    Caption: "{caption}"

    Return ONLY this JSON object:
    {{
      "is_realistic": <true | false>,
      "realism_score": <float 0.0–1.0>,
      "issues": ["<issue1 if any>"]
    }}
