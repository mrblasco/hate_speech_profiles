## Experimental design parameters for hate speech vignette study
## All generation is deterministic given these parameters + seed.

study:
  name: "hate_speech_escalation_vignettes"
  version: "1.0.0"

# Maps design list keys → Python Enum class names.
# Add an entry here whenever you add a new list dimension under design:.
enums:
  respondent_country:   RespondentCountry
  target_age_group:     AgeGroup
  target_gender:        Gender
  target_religion:      Religion
  target_origin:        CountryOfOrigin
  post_topic:           PostTopic
  post_engagement:      PostEngagement
  comment_severities:   CommentSeverity
  comment_anonymity:    CommentAnonymity

# Factors crossed at HTML render time (not in the profile design matrix).
# comment_severities drives LLM generation (already produces one StimulusRow per level).
# These two are pure display manipulations crossed over each StimulusRow:
#   3 severities × 2 anonymity × 2 engagement = 12 HTML files per topic.
stimulus_factors:
  - comment_anonymity
  - post_engagement

design:
  respondent_country:
    - Italy
    - Germany
    - France
    - Belgium
    - Spain

  post_topic:
    # Migration & integration
    - supports expanded refugee resettlement
    - opposes expanded refugee resettlement

    - supports stricter EU external border controls
    - opposes stricter EU external border controls

    - supports multicultural integration policies
    - opposes multicultural integration policies

    # Gender & equality
    - supports gender quotas in corporate leadership
    - opposes gender quotas in corporate leadership

    - supports stronger transgender rights protections
    - opposes stronger transgender rights protections

    # National identity & sovereignty
    - supports stronger national identity policies
    - opposes stronger national identity policies

    - supports prioritising national sovereignty over EU integration
    - opposes prioritising national sovereignty over EU integration

    # Climate & economy
    - supports ambitious climate transition policies
    - opposes ambitious climate transition policies

    - supports reducing agricultural environmental regulations
    - opposes reducing agricultural environmental regulations

  post_engagement:
    - high
    - low

  target_age_group:
    - young_adult   # 18–25

  target_gender:
    - male
    - female

  target_religion:
    - Muslim
    - Christian
    - Jewish

  target_origin:
    - Italy
    - Spain
    - France

  comment_severities:
    - opposing_opinion
    - dehumanising
    - inciting_violence
  
  comment_anonymity:
    - Anonymous
    - Not-anonymous


  # Age ranges per group
  age_ranges:
    adolescent:
      min: 13
      max: 17
    young_adult:
      min: 18
      max: 25

generation:
  # Default number of profiles to generate
  n_profiles: 50

  # LLM generation parameters
  temperature: 0.9
  max_tokens: 1024

  # Retry / rate limiting
  max_retries: 3
  retry_delay_seconds: 5
  requests_per_minute: 30

  # Async concurrency limit
  concurrency: 5

  # Post word count constraints
  post_min_words: 15
  post_max_words: 40

  # Fuzzy deduplication threshold (0–1; lower = stricter)
  dedup_threshold: 0.85

  # Cache LLM responses to disk for reproducibility
  enable_cache: true

validation:
  # Run LLM judge for severity classification
  enable_severity_judge: true

  # Fraction of posts sampled for realism check
  realism_sample_rate: 1.0

  # Minimum judge agreement rate before warning
  min_judge_agreement: 0.80

  # Reject items where judge disagrees with intended severity
  reject_on_mismatch: true

output:
  formats:
    - csv
    - jsonl
    - json_metadata
  log_prompts: true
  save_intermediate: true
